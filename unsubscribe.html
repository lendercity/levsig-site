<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevSig — Unsubscribe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{background:#111;border:1px solid #1E1E1E;border-radius:8px;padding:2.5rem;max-width:420px;width:100%;text-align:center}
.logo{font-family:'Space Mono',monospace;font-size:1.25rem;font-weight:700;margin-bottom:2rem}
.logo span{color:#00C853}
h1{font-size:1.25rem;font-weight:600;margin-bottom:.5rem}
p{font-size:.875rem;color:#666;line-height:1.7;margin-bottom:1.5rem}
input{width:100%;font-family:'Space Mono',monospace;font-size:.85rem;padding:.75rem 1rem;background:#0D0D0D;border:1px solid #2A2A2A;border-radius:4px;color:#fff;outline:none;margin-bottom:1rem}
input:focus{border-color:#00C853}
button{width:100%;font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;padding:.75rem;background:#FF3B30;color:#fff;border:none;border-radius:4px;cursor:pointer}
button:hover{opacity:.9}
.msg{margin-top:1rem;font-size:.85rem;padding:.75rem;border-radius:4px;display:none}
.msg.success{background:rgba(0,200,83,.1);color:#00C853;display:block}
.msg.error{background:rgba(255,59,48,.1);color:#FF3B30;display:block}
.back{display:block;margin-top:1.5rem;font-family:'Space Mono',monospace;font-size:.7rem;color:#444;text-decoration:none}
.back:hover{color:#888}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lev<span>Sig</span></div>
  <h1>Unsubscribe</h1>
  <p>Enter your email address to stop receiving LevSig daily signal emails.</p>
  <input type="email" id="email" placeholder="your@email.com">
  <button onclick="unsubscribe()">UNSUBSCRIBE</button>
  <div class="msg" id="msg"></div>
  <a href="/" class="back">← Back to levsig.com</a>
</div>

<script>
async function unsubscribe() {
  const email = document.getElementById('email').value.trim();
  const msg   = document.getElementById('msg');
  msg.className = 'msg';
  msg.style.display = 'none';

  if (!email || !email.includes('@')) {
    msg.textContent = 'Please enter a valid email address.';
    msg.className = 'msg error';
    return;
  }

  try {
    const res = await fetch('https://levsigapi-production.up.railway.app/unsubscribe?email=' + encodeURIComponent(email));
    if (res.ok) {
      msg.textContent = "You've been unsubscribed. You won't receive any more signal emails.";
      msg.className = 'msg success';
      document.getElementById('email').value = '';
    } else {
      msg.textContent = 'Something went wrong. Email support@levsig.com to unsubscribe manually.';
      msg.className = 'msg error';
    }
  } catch(e) {
    msg.textContent = 'Something went wrong. Email support@levsig.com to unsubscribe manually.';
    msg.className = 'msg error';
  }
}

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') unsubscribe();
});
</script>
</body>
</html>
