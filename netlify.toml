[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-eval' 'unsafe-inline' https: data:; connect-src 'self' https:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https:;"

[[redirects]]
  from = "/members.html"
  to = "/members.html"
  status = 200

[[redirects]]
  from = "/track.html"
  to = "/track.html"
  status = 200

[[redirects]]
  from = "/terms.html"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/unsubscribe.html"
  to = "/unsubscribe.html"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/unsubscribe.html"
  status = 200

[[redirects]]
  from = "/learn.html"
  to = "/learn.html"
  status = 200

[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

[[redirects]]
  from = "/learn/*"
  to = "/learn/:splat"
  status = 200
  force = true
  
[[redirects]]
